# npm release workflow for pi-superagents.
#
# Responsibilities:
# - publish GitHub Releases to npm through Trusted Publishing and OIDC
# - verify the release tag matches package.json before publishing
# - run the same quality gates used by CI before npm receives the package

name: Release

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish npm package
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm install

      - name: Verify release tag matches package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail

          if ! printf "%s" "$RELEASE_TAG" | grep -Eq "^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$"; then
            echo "Release tag must look like vX.Y.Z or vX.Y.Z-prerelease.N; got $RELEASE_TAG"
            exit 1
          fi

          package_version="$(node -p "require('./package.json').version")"
          tag_version="${RELEASE_TAG#v}"

          if [ "$package_version" != "$tag_version" ]; then
            echo "package.json version ($package_version) does not match release tag ($RELEASE_TAG)."
            exit 1
          fi

      - name: Typecheck
        run: npm run typecheck

      - name: Lint and format check
        run: npx biome check .

      - name: Run all tests
        run: npm run test:all

      - name: Verify npm package contents
        run: npm pack --dry-run --json

      - name: Publish to npm
        env:
          IS_PRERELEASE: ${{ github.event.release.prerelease }}
        run: |
          set -euo pipefail

          if [ "$IS_PRERELEASE" = "true" ]; then
            npm publish --access public --tag next
          else
            npm publish --access public
          fi
