# Bug report issue form for pi-superagents.
#
# Responsibilities:
# - collect reproducible extension, command, and runtime failures
# - capture safe logs, versions, and configuration snippets
# - remind reporters to redact secrets before submission

name: Bug Report
description: Report a reproducible problem in pi-superagents
title: "bug: <short description>"
labels:
  - bug
  - type:bug
  - status:needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail to reproduce the problem safely.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: A concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Exact steps so maintainers can reproduce.
      placeholder: |
        1. Run `pi install npm:@teelicht/pi-superagents`
        2. Execute `/sp-implement ...`
        3. Observe error `...`
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      placeholder: What actually happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Output
      description: Paste relevant Pi, command, or stack-trace output.
      render: shell

  - type: textarea
    id: config
    attributes:
      label: Relevant Config
      description: Include safe snippets from `~/.pi/agent/extensions/subagent/config.json`.
      render: json

  - type: input
    id: package-version
    attributes:
      label: pi-superagents Version
      placeholder: e.g. 0.5.0

  - type: input
    id: pi-version
    attributes:
      label: Pi Version
      placeholder: e.g. 0.67.1

  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      placeholder: e.g. 24.11.0

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. macOS 15 / Windows 11 / Ubuntu 24.04

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight checks
      options:
        - label: I searched existing issues before filing
          required: false
        - label: I removed or redacted secrets from logs/config
          required: true
