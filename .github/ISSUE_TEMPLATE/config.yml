# Issue template chooser configuration for pi-superagents.
#
# Responsibilities:
# - route support questions to discussions
# - keep public issue intake focused on actionable reports
# - direct vulnerability reports to GitHub's private security flow

blank_issues_enabled: false
contact_links:
  - name: Usage question or help request
    url: https://github.com/teelicht/pi-superagents/discussions
    about: Ask questions, share workflows, and get help from maintainers/community.
  - name: Security vulnerability report
    url: https://github.com/teelicht/pi-superagents/security/policy
    about: Please report security vulnerabilities privately.
